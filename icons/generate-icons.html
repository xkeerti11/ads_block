<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h2>AdShield Pro Icon Generator</h2>
<p>Right-click each icon below and "Save image as..." to save the PNG files.</p>
<div style="display:flex;gap:20px;align-items:end;margin:20px;">
  <div><canvas id="c16" width="16" height="16"></canvas><br>icon16.png</div>
  <div><canvas id="c48" width="48" height="48"></canvas><br>icon48.png</div>
  <div><canvas id="c128" width="128" height="128"></canvas><br>icon128.png</div>
</div>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#1D4ED8');
  grad.addColorStop(1, '#1E3A8A');

  // Rounded rect background
  const r = s * 0.19;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Shield
  const cx = s / 2, top = s * 0.16, bot = s * 0.88;
  const sw = s * 0.28, sh = s * 0.27;
  ctx.beginPath();
  ctx.moveTo(cx, top);
  ctx.lineTo(cx + sw, top + sh);
  ctx.lineTo(cx + sw, s * 0.62);
  ctx.quadraticCurveTo(cx, bot, cx, bot);
  ctx.quadraticCurveTo(cx, bot, cx - sw, s * 0.62);
  ctx.lineTo(cx - sw, top + sh);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'white';
  ctx.lineWidth = Math.max(1, s * 0.04);
  ctx.lineJoin = 'round';
  ctx.stroke();

  // "AD" text (only if large enough)
  if (s >= 48) {
    ctx.fillStyle = 'white';
    ctx.font = `bold ${s * 0.26}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('AD', cx, s * 0.58);
  }
}

['c16', 'c48', 'c128'].forEach(id => drawIcon(document.getElementById(id)));
</script>
</body>
</html>
